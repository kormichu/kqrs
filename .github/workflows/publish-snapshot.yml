name: Publish Snapshot Packages

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - 'main'

concurrency:
  group: ${{ github.workflow}}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-snapshot:
    name: Publish Snapshot to Maven Central
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Resolve snapshot version
        id: version
        run: |
          BASE_VERSION=$(./gradlew cV -q --no-daemon | grep -oP '\d+\.\d+\.\d+' | head -1)
          echo "VERSION=${BASE_VERSION}-SNAPSHOT" >> $GITHUB_OUTPUT

      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon -Prelease.forceVersion=${{ steps.version.outputs.VERSION }}

      - name: Publish Snapshot to Maven Central
        run: ./gradlew publishMavenJavaPublicationToMavenCentralRepository --no-daemon -Prelease.forceVersion=${{ steps.version.outputs.VERSION }}
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}

